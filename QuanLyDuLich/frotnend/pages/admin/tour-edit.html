<div class="container" style="padding: 0;">
    <div style="background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); max-width: 800px;">
        <h2 id="tour-form-title" style="color: #1a472a; font-size: 1.8rem; margin-bottom: 24px;">Thêm Tour</h2>
        
        <form id="tour-form" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-weight: 600; color: #1a472a;">Tên tour</label>
                <input type="text" id="tenTour" name="tenTour" class="form-control" required style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;">
            </div>
            
            <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-weight: 600; color: #1a472a;">Mô tả</label>
                <textarea id="moTa" name="moTa" class="form-control" rows="4" style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;"></textarea>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-weight: 600; color: #1a472a;">Giá cơ bản</label>
                    <input type="number" id="giaCoBan" name="giaCoBan" class="form-control" required style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;">
                </div>
                <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-weight: 600; color: #1a472a;">Số ngày</label>
                    <input type="number" id="soNgay" name="soNgay" class="form-control" placeholder="Ví dụ: 3" style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;">
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-weight: 600; color: #1a472a;">Điểm đến</label>
                    <select id="maDiemDen" name="maDiemDen" class="form-control" style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;">
                        <option value="">-- Chọn điểm đến --</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-weight: 600; color: #1a472a;">Trạng thái</label>
                    <select id="trangThai" name="trangThai" class="form-control" style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;">
                        <option value="Hot">Hot</option>
                        <option value="Mới">Mới</option>
                        <option value="Thường">Thường</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-weight: 600; color: #1a472a;">Hình ảnh</label>
                <input type="file" id="hinhAnhFile" name="hinhAnhFile" accept="image/*" class="form-control" style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;">
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 10px;">
                <button type="submit" style="flex: 1; background: linear-gradient(135deg, #1e5a88, #144d74); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 1rem;">💾 Lưu</button>
                <button type="button" onclick="navigate('tours'); return false;" style="flex: 1; background: #ddd; color: #333; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 1rem;">❌ Hủy</button>
            </div>
        </form>
    </div>
</div>
