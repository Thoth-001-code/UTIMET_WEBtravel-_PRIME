<div class="container">
    <h2 class="mb-3">Quản lý Đặt tour</h2>

        <input type="text" id="search-booking" class="form-control" placeholder="Tìm kiếm đặt tour...">
    </div>
    <div class="card">
        <table id="booking-table">
            <thead>
                <tr>
                    <th>Mã đặt</th>
                    <th>Khách hàng</th>
                    <th>Tour</th>
                    <th>Ngày đặt</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <div id="booking-pagination" class="pagination"></div>
</div>
