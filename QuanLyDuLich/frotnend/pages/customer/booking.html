<div class="container" style="padding: 40px 20px;">
    <div class="card" style="background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto;">
        <h2 style="color: #1a472a; font-size: 1.8rem; margin-bottom: 24px;">Đặt tour</h2>
        <form id="booking-form" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-weight: 600; color: #1a472a;">Số người đi</label>
                <input type="number" id="soNguoiDi" class="form-control" min="1" required style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;">
            </div>
            <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                <label style="font-weight: 600; color: #1a472a;">Ghi chú</label>
                <textarea id="ghiChu" class="form-control" rows="3" style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;"></textarea>
            </div>
            <div style="display: flex; gap: 12px;">
                <button type="submit" style="flex: 1; background: linear-gradient(135deg, #1e5a88, #144d74); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 1rem;">Đặt tour</button>
                <button type="button" onclick="navigate('home'); return false;" style="flex: 1; background: #ddd; color: #333; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 1rem;">Hủy</button>
            </div>
        </form>
    </div>
</div>
