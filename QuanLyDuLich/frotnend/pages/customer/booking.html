<div class="container">
    <div class="card">
        <h2>Đặt tour</h2>
        <form id="booking-form">
            <div class="form-group">
                <label>Người đi</label>
                <input type="number" id="soNguoiDi" class="form-control" min="1" required>
            </div>
            <div class="form-group">
                <label>Ghi chú</label>
                <textarea id="ghiChu" class="form-control" rows="3"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Đặt tour</button>
                <button type="button" class="btn btn-warning" onclick="navigate('home')">Hủy</button>
            </div>
        </form>
    </div>
</div>
